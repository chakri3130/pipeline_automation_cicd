name: Ionic Multi-Env CI/CD

on:
  push:
    branches: ["dev", "qa", "main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Install Ionic CLI
        run: npm install -g @ionic/cli

      # 🧠 Dynamic environment selection
      - name: Set Environment
        id: env
        run: |
          if [[ "${GITHUB_REF##*/}" == "dev" ]]; then
            echo "config=development" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF##*/}" == "qa" ]]; then
            echo "config=qa" >> $GITHUB_OUTPUT
          else
            echo "config=production" >> $GITHUB_OUTPUT
          fi

      - name: Build App
        run: ionic build --configuration=${{ steps.env.outputs.config }}

      - name: Sync Capacitor
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ steps.env.outputs.config }}
          path: android/app/build/outputs/apk/debug/app-debug.apk